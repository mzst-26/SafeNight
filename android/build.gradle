// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

subprojects { subproject ->
  if (subproject.name == 'app') {
    subproject.tasks.configureEach { task ->
      if (task.name.startsWith('configureCMake') && task.name.contains('RelWithDebInfo')) {
        task.dependsOn(
          ':react-native-reanimated:prefabReleasePackage',
          ':react-native-worklets:prefabReleasePackage'
        )
      }
    }
  }

  if (subproject.name == 'react-native-reanimated') {
    subproject.tasks.configureEach { task ->
      if (task.name.startsWith('configureCMake') && task.name.contains('RelWithDebInfo')) {
        task.dependsOn(':react-native-worklets:prefabReleasePackage')
      }
    }
  }
}
