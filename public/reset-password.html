<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeNight — Reset Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      color: #1E293B;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }
    .icon {
      width: 72px; height: 72px;
      background: #EEF2FF;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 15px; color: #64748B; line-height: 1.5; margin-bottom: 24px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #E0E7FF;
      border-top-color: #6366F1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #DC2626; font-size: 14px; margin-top: 12px; }
    .manual-link {
      display: inline-block;
      margin-top: 20px;
      color: #6366F1;
      font-weight: 600;
      text-decoration: none;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Opening SafeNight…</h1>
    <p id="msg">Taking you to the password reset screen in the app.</p>
    <div class="spinner" id="spinner"></div>
    <a id="manual" class="manual-link" style="display:none" href="#">Open App</a>
  </div>

  <script>
    (function () {
      // Supabase redirects here with tokens in the URL hash fragment:
      // https://safenight.netlify.app/reset-password#access_token=...&type=recovery
      //
      // This page reads those tokens and forwards them as query params to the
      // safenight:// deep link — query params are reliably received by Android/iOS.

      var hash = window.location.hash.replace(/^#/, '');
      var params = new URLSearchParams(hash);

      var accessToken  = params.get('access_token');
      var refreshToken = params.get('refresh_token') || '';
      var type         = params.get('type') || '';
      var expiresIn    = params.get('expires_in') || '';

      if (type !== 'recovery' || !accessToken) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').textContent =
          'This link is invalid or has already been used. Please request a new password reset.';
        return;
      }

      var deepLink =
        'safenight://reset-password' +
        '?access_token='  + encodeURIComponent(accessToken) +
        '&refresh_token=' + encodeURIComponent(refreshToken) +
        '&type=recovery' +
        (expiresIn ? '&expires_in=' + encodeURIComponent(expiresIn) : '');

      // Show a manual button in case auto-redirect doesn't fire (some browsers)
      var manualEl = document.getElementById('manual');
      manualEl.href = deepLink;
      manualEl.style.display = 'inline-block';

      // Auto-redirect
      window.location.href = deepLink;

      // After 2 s, update copy to encourage manual tap
      setTimeout(function () {
        document.getElementById('msg').textContent =
          'Tap the button below if the app did not open automatically.';
        document.getElementById('spinner').style.display = 'none';
      }, 2000);
    })();
  </script>
</body>
</html>
