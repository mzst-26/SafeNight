# Netlify config for Expo web static export
[build]
  command = "npx expo export --platform web"
  publish = "dist"

# Environment variables (set these in Netlify Dashboard > Site settings > Environment variables):
#   EXPO_PUBLIC_API_BASE_URL          = https://safenighthome-gateway.onrender.com
#   EXPO_PUBLIC_SAFETY_API_URL        = https://safenighthome-safety.onrender.com
#   EXPO_PUBLIC_USER_API_URL          = https://safenighthome-user.onrender.com
#   EXPO_PUBLIC_SUBSCRIPTION_API_URL  = https://safenighthome-subscription.onrender.com
#   EXPO_PUBLIC_OSM_USER_AGENT        = SafeNightHome/1.0

# ── Security & SEO Headers (all pages) ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ── Cache static assets aggressively ────────────────────────────────────
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Short cache for HTML (allow SEO changes to propagate quickly) ───────
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Serve robots.txt & sitemap.xml as-is ────────────────────────────────
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "public, max-age=86400"

# ── Non-SPA routes (static files should be served directly) ─────────────
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

[[redirects]]
  from = "/og-image.png"
  to = "/og-image.png"
  status = 200

# SPA fallback — all other routes serve index.html (Expo Router handles client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
