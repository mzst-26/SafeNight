# Render.com deployment config — 5-service architecture
# See: https://render.com/docs/blueprint-spec
#
# Service 1: API Gateway    — directions, static maps, AI explanations, nearby
# Service 2: Safety Service — CPU-heavy A* pathfinding + safety scoring
# Service 3: User Data      — auth, usage tracking, reports, reviews (Supabase)
# Service 4: Subscription   — Stripe checkout, portal, webhook
# Service 5: Geocode        — place search, forward geocoding, reverse geocoding
#                             (Nominatim-backed with in-process TTL cache)
#
# All share the same rootDir (backend/) and node_modules,
# but run separate entry points on independent free-tier instances.

services:
  # ─── API Gateway ────────────────────────────────────────────────────────────
  # Handles: walking directions (OSRM), static map tiles (OSM),
  #          nearby places (Overpass), AI route explanations (OpenAI),
  #          app integrity verification.
  # Does NOT handle geocoding — that moved to safenighthome-geocode.
  - type: web
    name: safenighthome-gateway
    runtime: node
    region: eu-west
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/gateway/server.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://safenight.netlify.app
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
    healthCheckPath: /api/health

  # ─── User Data Service ──────────────────────────────────────────────────────
  - type: web
    name: safenighthome-user
    runtime: node
    region: eu-west
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/user/server.js
    envVars:
      - key: PORT
        value: 3003
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://safenight.netlify.app
      - key: SUPABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false  # Set manually in Render dashboard
    healthCheckPath: /api/health  # ─── Safety Compute Service ─────────────────────────────────────────────────
  - type: web
    name: safenighthome-safety
    runtime: node
    region: eu-west
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/safety/server.js
    envVars:
      - key: PORT
        value: 3002
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://safenight.netlify.app
      - key: SAFE_ROUTES_CACHE_DIR
        value: /tmp/safenight-cache
      - key: SAFE_ROUTES_ALLOW_STALE_CACHE
        value: "1"
      - key: OVERPASS_REQUEST_BUDGET_MS
        value: "30000"
      - key: OVERPASS_SPLIT_FALLBACK_EXTRA_BUDGET_MS
        value: "15000"
      - key: OVERPASS_HEDGE_DELAY_MS
        value: "250"
      - key: OVERPASS_SERVER_COOLDOWN_MS
        value: "30000"
      - key: OVERPASS_RETRY_STAGGER_MS
        value: "300"
      - key: SAFE_ROUTES_OVERPASS_STALE_FETCH_GRACE_MS
        value: "2200"
      - key: SAFE_ROUTES_CRIME_STALE_FETCH_GRACE_MS
        value: "1800"
    healthCheckPath: /api/health

  # ─── Subscription Service ────────────────────────────────────────────────────
  - type: web
    name: safenighthome-subscription
    runtime: node
    region: eu-west
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/subscription/server.js
    envVars:
      - key: PORT
        value: 3004
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://safenight.netlify.app
      - key: STRIPE_SECRET_KEY
        sync: false  # Set manually in Render dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false  # Set manually in Render dashboard
    healthCheckPath: /api/health

  # ─── Geocode Service ────────────────────────────────────────────────────────
  # Handles: place search (autocomplete), forward geocoding (placeId → lat/lng),
  #          reverse geocoding (lat/lng → address).
  # Backed by Nominatim (free, no API key). All responses are cached in-process
  # (5 min autocomplete, 60 min details/reverse) so the free tier handles
  # heavy search load without hitting Nominatim rate limits.
  - type: web
    name: safenighthome-geocode
    runtime: node
    region: eu-west
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/geocode/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://safenight.netlify.app
      - key: OSM_USER_AGENT
        value: SafeNightHome/1.0 (geocode-service; contact@safenighthome.app)
    healthCheckPath: /api/health
