# Build Android APK on push to main and upload to GitHub Releases.
# The latest APK is always at:
#   https://github.com/Jrtowers-prog/PlymHack2026New/releases/download/latest/SafeNightHome.apk

name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - '*.md'
      - '.github/workflows/build-ios.yml'
      - 'netlify.toml'
      - 'render.yaml'
  workflow_dispatch: # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed for creating releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Generate build number
        id: buildnum
        run: echo "value=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create .env for build
        run: |
          cat <<EOF > .env
          EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_SAFETY_API_URL=${{ secrets.EXPO_PUBLIC_SAFETY_API_URL }}
          EXPO_PUBLIC_USER_API_URL=${{ secrets.EXPO_PUBLIC_USER_API_URL }}
          EXPO_PUBLIC_SUBSCRIPTION_API_URL=${{ secrets.EXPO_PUBLIC_SUBSCRIPTION_API_URL }}
          EXPO_PUBLIC_OPENAI_API_KEY=${{ secrets.EXPO_PUBLIC_OPENAI_API_KEY }}
          EXPO_PUBLIC_OSM_USER_AGENT=${{ secrets.EXPO_PUBLIC_OSM_USER_AGENT }}
          EXPO_PUBLIC_OSM_EMAIL=${{ secrets.EXPO_PUBLIC_OSM_EMAIL }}
          EXPO_PUBLIC_BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EXPO_PUBLIC_BUILD_NUMBER=${{ steps.buildnum.outputs.value }}
          EOF

      - name: Restore release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build release APK
        working-directory: android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
        run: ./gradlew assembleRelease --no-daemon --build-cache -PreactNativeArchitectures=arm64-v8a

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk SafeNightHome.apk

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Delete old release so published_at resets
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.sha.outputs.short }})"
          body: |
            Automatically built from commit `${{ github.sha }}`.
            BUILD_NUMBER=${{ steps.buildnum.outputs.value }}

            **Download:**
            - [SafeNightHome.apk](https://github.com/Jrtowers-prog/PlymHack2026New/releases/download/latest/SafeNightHome.apk) (Android)
            - [SafeNightHome.ipa](https://github.com/Jrtowers-prog/PlymHack2026New/releases/download/latest/SafeNightHome.ipa) (iOS)
          files: SafeNightHome.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
