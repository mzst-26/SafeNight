name: CI Test and Coverage

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-test-all-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard-artifacts:
    name: Guard generated artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository artifact guard
        run: bash ./scripts/guard-artifacts.sh --ci

  test-all-coverage:
    name: Run unified coverage suite
    runs-on: ubuntu-latest
    needs: guard-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix ./backend ci

      - name: Run all tests with coverage
        run: npm run test:all:coverage
