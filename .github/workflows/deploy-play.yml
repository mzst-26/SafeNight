# Build a signed AAB, auto-bump the version, and upload to Google Play internal track.
# Triggers on every push to main (excluding backend/docs/iOS changes).
# The version bump commit is tagged [skip ci] so it does NOT re-trigger this workflow.

name: Deploy to Google Play

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - '*.md'
      - '.github/workflows/build-ios.yml'
      - '.github/workflows/build-android.yml'
      - 'netlify.toml'
      - 'render.yaml'
  workflow_dispatch: # allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push the version bump commit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Read & bump version ────────────────────────────────────────────────
      - name: Bump version
        id: version
        run: |
          PROPS=android/version.properties
          OLD_CODE=$(grep VERSION_CODE $PROPS | cut -d= -f2)
          OLD_NAME=$(grep VERSION_NAME $PROPS | cut -d= -f2)

          NEW_CODE=$((OLD_CODE + 1))

          # Auto-bump patch component of versionName (e.g. 1.0.2 → 1.0.3)
          MAJOR=$(echo $OLD_NAME | cut -d. -f1)
          MINOR=$(echo $OLD_NAME | cut -d. -f2)
          PATCH=$(echo $OLD_NAME | cut -d. -f3)
          NEW_NAME="$MAJOR.$MINOR.$((PATCH + 1))"

          # Write back
          sed -i "s/VERSION_CODE=.*/VERSION_CODE=$NEW_CODE/" $PROPS
          sed -i "s/VERSION_NAME=.*/VERSION_NAME=$NEW_NAME/" $PROPS

          # Also bump app.json "version" to keep them in sync
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_NAME\"/" app.json

          echo "code=$NEW_CODE"   >> "$GITHUB_OUTPUT"
          echo "name=$NEW_NAME"   >> "$GITHUB_OUTPUT"
          echo "Bumped: $OLD_CODE ($OLD_NAME) → $NEW_CODE ($NEW_NAME)"

      # ── Commit version bump back to main ──────────────────────────────────
      - name: Commit & push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/version.properties app.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.code }}) [skip ci]"
          git push

      # ── JS dependencies ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      # ── Java / Gradle ─────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ── Environment ───────────────────────────────────────────────────────
      - name: Create .env
        run: |
          cat <<EOF > .env
          EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_SAFETY_API_URL=${{ secrets.EXPO_PUBLIC_SAFETY_API_URL }}
          EXPO_PUBLIC_USER_API_URL=${{ secrets.EXPO_PUBLIC_USER_API_URL }}
          EXPO_PUBLIC_SUBSCRIPTION_API_URL=${{ secrets.EXPO_PUBLIC_SUBSCRIPTION_API_URL }}
          EXPO_PUBLIC_GEOCODE_API_URL=https://plymhack2026-fork-1-h8ik.onrender.com
          EXPO_PUBLIC_OPENAI_API_KEY=${{ secrets.EXPO_PUBLIC_OPENAI_API_KEY }}
          EXPO_PUBLIC_OSM_USER_AGENT=${{ secrets.EXPO_PUBLIC_OSM_USER_AGENT }}
          EXPO_PUBLIC_OSM_EMAIL=${{ secrets.EXPO_PUBLIC_OSM_EMAIL }}
          EXPO_PUBLIC_BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EXPO_PUBLIC_BUILD_NUMBER=${{ steps.version.outputs.code }}
          EOF

      # ── Signing ───────────────────────────────────────────────────────────
      - name: Restore release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      # ── Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Build AAB ─────────────────────────────────────────────────────────
      - name: Build release AAB
        working-directory: android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
        run: ./gradlew bundleRelease --no-daemon --build-cache

      # ── Upload to Google Play internal track ──────────────────────────────
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          packageName: com.safenight.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: .github/play-whatsnew   # optional — see note below

      # ── Also attach the AAB as a GitHub Release artifact ─────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: "v${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.code }})"
          body: |
            Automatically built and deployed from commit `${{ github.sha }}`.

            **Play Store:** internal track → promote to production in the Play Console.
          files: android/app/build/outputs/bundle/release/app-release.aab
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
